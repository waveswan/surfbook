live_commentary:
  style_rules:
    max_words: 8
    prefer_colors_over_names: true
    numbers_first: true
    avoid_long_explanations: true
  phrases:
    heat_start:
      - "Старт хита"
      - "Хит начался"
    heat_end:
      - "Хит завершён"
    last_5_minutes:
      - "Последние 5 минут"
    last_60_seconds:
      - "Последняя минута"
    time_left:
      - "Осталось {time}"
    wave_scored:
      high:
        - "Отличная волна — {score}"
      medium:
        - "Хорошая волна — {score}"
      default:
        - "Оценка: {score}"
    position_changed:
      first:
        - "{color} выходит на первое место"
      other:
        - "{color} поднимается на {position} место"
    need_score:
      - "Нужно {score} для первого места"
      - "Нужно {score} для прохода"
    after_wave:
      enough:
        - "Этого хватает — выходит вперёд"
      close:
        - "Почти — немного не хватает"
      not_enough:
        - "Недостаточно"
    priority:
      - "Приоритет у {color}"
      - "{color} с приоритетом"
    priority_changed:
      - "Приоритет переходит к {color}"
      - "{color} получает приоритет"
    interference:
      - "Зафиксирована помеха"
      - "Помеха против {color}"
    interference_effect:
      - "Оценка обнулена"
      - "Вторая волна уменьшена"
    maneuvers:
      - "Хороший боттом-терн"
      - "Отличный катбэк"
      - "Мощный ре-энтри"
      - "Работает в критической секции"
      - "Работает в кармане волны"
    drama:
      needs_wave_last_minute:
        - "Нужна волна прямо сейчас"
      last_seconds:
        - "Последние секунды"
      late_leader_change:
        - "Разворот в самом конце"

auto_commentator:
  events:
    - "HEAT_START"
    - "HEAT_END"
    - "TIME_UPDATE"
    - "WAVE_SCORED"
    - "TOTAL_CHANGED"
    - "POSITION_CHANGED"
    - "PRIORITY_CHANGED"
    - "NEED_UPDATED"
    - "INTERFERENCE_CALLED"
    - "INTERFERENCE_EFFECT"
    - "LAST_5_MIN"
    - "LAST_60_SEC"
    - "BUZZER"
  cooldown_seconds:
    NEED_UPDATED: 10
    PRIORITY_CHANGED: 5
    TIME_UPDATE: 30
    WAVE_SCORED: 3
    POSITION_CHANGED: 5
    INTERFERENCE_CALLED: 1
  rules:
    WAVE_SCORED:
      - condition: "score >= 7"
        phrase_key: "live_commentary.phrases.wave_scored.high"
      - condition: "score >= 5"
        phrase_key: "live_commentary.phrases.wave_scored.medium"
      - condition: "default"
        phrase_key: "live_commentary.phrases.wave_scored.default"
    POSITION_CHANGED:
      - condition: "new_position == 1"
        phrase_key: "live_commentary.phrases.position_changed.first"
      - condition: "default"
        phrase_key: "live_commentary.phrases.position_changed.other"
    NEED_UPDATED:
      - condition: "needs_for == 'win'"
        phrase: "Нужно {score} для первого места"
      - condition: "needs_for == 'advance'"
        phrase: "Нужно {score} для прохода"
    AFTER_WAVE:
      - condition: "score >= need"
        phrase_key: "live_commentary.phrases.after_wave.enough"
      - condition: "score >= need - 0.5"
        phrase_key: "live_commentary.phrases.after_wave.close"
      - condition: "default"
        phrase_key: "live_commentary.phrases.after_wave.not_enough"
    PRIORITY_CHANGED:
      - condition: "default"
        phrase_key: "live_commentary.phrases.priority_changed"
    INTERFERENCE_CALLED:
      - condition: "default"
        phrase_key: "live_commentary.phrases.interference"

# ISA Surfing Rulebook Russian Terminology Glossary
# Source: ISA Rulebook & Contest Administration Manual, November 2025
# Purpose: unified terminology for Russian translation, judging education, TopHeats UI, and live commentary.
# Status values:
#   approved  - accepted working term
#   proposed  - recommended, but may need review
#   discussion - unresolved / needs decision

meta:
  project: "Перевод учебника/правил ISA по серфингу на русский язык"
  source_document: "ISA Rulebook & Contest Administration Manual"
  source_version: "November 2025"
  glossary_version: "0.1.0"
  language_from: "en"
  language_to: "ru"
  translation_strategy: "профессиональный русский язык с сохранением устоявшихся серф-терминов"
  notes:
    - "Один английский термин должен иметь один основной русский эквивалент."
    - "В первом употреблении спорных англицизмов допускается пояснение в скобках."
    - "Для интерфейса и трансляций используются короткие формулировки."

